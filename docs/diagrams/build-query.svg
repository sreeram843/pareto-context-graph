<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="900" height="430" rx="14" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="32" y="38" font-size="20" font-weight="700" fill="#1f2328">Build time vs query time</text>
  <text x="32" y="59" font-size="13" fill="#57606a">The graph is built once (and updated incrementally); every request just reads it.</text>

  <defs>
    <marker id="bq" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Build lane -->
  <rect x="30" y="80" width="840" height="104" rx="12" fill="#eef6ff" stroke="#93c5fd"/>
  <text x="48" y="102" font-size="13" font-weight="700" fill="#1e40af">Build time — once, then incremental sync</text>
  <g font-size="12">
    <rect x="48" y="114" width="130" height="50" rx="9" fill="#bfdbfe" stroke="#3b82f6"/>
    <text x="113" y="144" font-weight="700" fill="#1e3a8a" text-anchor="middle">git log</text>

    <rect x="230" y="114" width="160" height="50" rx="9" fill="#bfdbfe" stroke="#3b82f6"/>
    <text x="310" y="138" font-weight="700" fill="#1e3a8a" text-anchor="middle">co-change pairs</text>
    <text x="310" y="155" font-size="10.5" fill="#1e40af" text-anchor="middle">files that change together</text>

    <ellipse cx="540" cy="128" rx="56" ry="12" fill="#e9d5ff" stroke="#a855f7"/>
    <path d="M484 128 v22 a56 12 0 0 0 112 0 v-22" fill="#e9d5ff" stroke="#a855f7"/>
    <text x="540" y="146" font-weight="700" fill="#6b21a8" text-anchor="middle" font-size="11.5">graph.db</text>

    <ellipse cx="720" cy="128" rx="60" ry="12" fill="#e9d5ff" stroke="#a855f7"/>
    <path d="M660 128 v22 a60 12 0 0 0 120 0 v-22" fill="#e9d5ff" stroke="#a855f7"/>
    <text x="720" y="146" font-weight="700" fill="#6b21a8" text-anchor="middle" font-size="11.5">search index</text>
  </g>
  <g stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#bq)">
    <path d="M178 139 H 228"/>
    <path d="M390 134 C 430 130, 450 126, 482 124"/>
    <path d="M390 144 C 470 152, 560 150, 660 134"/>
  </g>

  <!-- Query lane -->
  <rect x="30" y="246" width="840" height="104" rx="12" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="48" y="268" font-size="13" font-weight="700" fill="#047857">Query time — per request, &lt; 1 s</text>
  <g font-size="12">
    <rect x="48" y="280" width="138" height="50" rx="9" fill="#a7f3d0" stroke="#10b981"/>
    <text x="117" y="304" font-weight="700" fill="#065f46" text-anchor="middle">seeds + query</text>
    <text x="117" y="320" font-size="10.5" fill="#047857" text-anchor="middle">files and/or a question</text>

    <rect x="214" y="280" width="120" height="50" rx="9" fill="#a7f3d0" stroke="#10b981"/>
    <text x="274" y="309" font-weight="700" fill="#065f46" text-anchor="middle">expand</text>

    <rect x="362" y="280" width="100" height="50" rx="9" fill="#a7f3d0" stroke="#10b981"/>
    <text x="412" y="309" font-weight="700" fill="#065f46" text-anchor="middle">rank</text>

    <rect x="490" y="280" width="130" height="50" rx="9" fill="#a7f3d0" stroke="#10b981"/>
    <text x="555" y="309" font-weight="700" fill="#065f46" text-anchor="middle">pack tiers</text>

    <rect x="648" y="280" width="172" height="50" rx="9" fill="#a7f3d0" stroke="#10b981"/>
    <text x="734" y="304" font-weight="700" fill="#065f46" text-anchor="middle">context_files</text>
    <text x="734" y="320" font-size="10.5" fill="#047857" text-anchor="middle">ranked, budgeted → agent</text>
  </g>
  <g stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#bq)">
    <path d="M186 305 H 212"/>
    <path d="M334 305 H 360"/>
    <path d="M462 305 H 488"/>
    <path d="M620 305 H 646"/>
  </g>

  <!-- store feeds query -->
  <g stroke="#a855f7" stroke-width="1.4" fill="none" stroke-dasharray="6 5" marker-end="url(#bq)">
    <path d="M520 154 C 420 200, 320 236, 282 278"/>
    <path d="M700 154 C 560 210, 360 244, 296 278"/>
  </g>
  <text x="356" y="226" font-size="10.5" fill="#7e22ce">read graph + index</text>
</svg>
