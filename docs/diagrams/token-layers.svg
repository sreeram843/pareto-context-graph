<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="900" height="430" rx="14" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="32" y="38" font-size="20" font-weight="700" fill="#1f2328">How the tokens drop</text>
  <text x="32" y="59" font-size="13" fill="#57606a">Five stacked layers — each one removes work before the agent reads a file.</text>

  <defs>
    <marker id="tl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- funnel bars, decreasing width -->
  <g>
    <rect x="70" y="86" width="700" height="54" rx="9" fill="#bfdbfe" stroke="#3b82f6"/>
    <text x="92" y="110" font-size="13.5" font-weight="700" fill="#1e3a8a">1 · Pick the right files</text>
    <text x="92" y="129" font-size="11.5" fill="#1e40af">co-change graph · query-first fusion · learned feedback</text>

    <rect x="100" y="150" width="640" height="54" rx="9" fill="#a5d8f3" stroke="#2f9fd0"/>
    <text x="122" y="174" font-size="13.5" font-weight="700" fill="#0c4a6e">2 · Retrieve before read</text>
    <text x="122" y="193" font-size="11.5" fill="#075985">tier-1 path + one-line summary (~30 tokens/file)</text>

    <rect x="135" y="214" width="570" height="54" rx="9" fill="#99e6cf" stroke="#10b981"/>
    <text x="157" y="238" font-size="13.5" font-weight="700" fill="#065f46">3 · Graph-bounded expand</text>
    <text x="157" y="257" font-size="11.5" fill="#047857">BFS / RWR caps · hub fast path (no whole-repo scan)</text>

    <rect x="175" y="278" width="490" height="54" rx="9" fill="#bbe8b0" stroke="#5bb14b"/>
    <text x="197" y="302" font-size="13.5" font-weight="700" fill="#1a4d12">4 · Delta on follow-ups</text>
    <text x="197" y="321" font-size="11.5" fill="#2f7d23">already_have + session skip files already in context</text>

    <rect x="215" y="342" width="410" height="54" rx="9" fill="#fcd9a8" stroke="#e0941f"/>
    <text x="237" y="366" font-size="13.5" font-weight="700" fill="#7c4a03">5 · Honest budget + prune</text>
    <text x="237" y="385" font-size="11.5" fill="#9a6207">token_budget cap · optional tier-3 compression</text>
  </g>

  <!-- "fewer tokens" axis -->
  <g stroke="#64748b" stroke-width="1.6" fill="none" marker-end="url(#tl)">
    <path d="M812 92 V 388"/>
  </g>
  <text x="834" y="240" font-size="12" font-weight="700" fill="#475569" transform="rotate(90 834 240)" text-anchor="middle">fewer tokens →</text>
</svg>
