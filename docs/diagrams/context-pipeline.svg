<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="760" height="620" rx="14" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="30" y="38" font-size="20" font-weight="700" fill="#1f2328">A context request, phase by phase</text>
  <text x="30" y="59" font-size="13" fill="#57606a">Each phase honours the deadline; an expired one returns partial results with truncated: true.</text>

  <defs>
    <marker id="cp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="cpd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- side inputs -->
  <g>
    <ellipse cx="640" cy="318" rx="46" ry="11" fill="#e9d5ff" stroke="#a855f7"/>
    <path d="M594 318 v20 a46 11 0 0 0 92 0 v-20" fill="#e9d5ff" stroke="#a855f7"/>
    <text x="640" y="334" font-size="11" font-weight="700" fill="#6b21a8" text-anchor="middle">session.json</text>

    <ellipse cx="640" cy="392" rx="46" ry="11" fill="#e9d5ff" stroke="#a855f7"/>
    <path d="M594 392 v20 a46 11 0 0 0 92 0 v-20" fill="#e9d5ff" stroke="#a855f7"/>
    <text x="640" y="408" font-size="11" font-weight="700" fill="#6b21a8" text-anchor="middle">feedback</text>
  </g>

  <!-- main column -->
  <g font-size="12.5">
    <!-- 9 phase rows -->
    <g>
      <rect x="60" y="84" width="420" height="44" rx="9" fill="#d1fae5" stroke="#34d399"/>
      <circle cx="84" cy="106" r="11" fill="#10b981"/><text x="84" y="110" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>
      <text x="106" y="111" font-weight="700" fill="#065f46">pre_context hooks</text>
    </g>
    <g>
      <rect x="60" y="140" width="420" height="44" rx="9" fill="#d1fae5" stroke="#34d399"/>
      <circle cx="84" cy="162" r="11" fill="#10b981"/><text x="84" y="166" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>
      <text x="106" y="167" font-weight="700" fill="#065f46">orchestrator plan <tspan font-weight="400" fill="#047857">· intent → signal weights</tspan></text>
    </g>
    <g>
      <rect x="60" y="196" width="420" height="44" rx="9" fill="#d1fae5" stroke="#34d399"/>
      <circle cx="84" cy="218" r="11" fill="#10b981"/><text x="84" y="222" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>
      <text x="106" y="223" font-weight="700" fill="#065f46">retrieve <tspan font-weight="400" fill="#047857">· co-change BFS / RWR</tspan></text>
    </g>
    <g>
      <rect x="60" y="252" width="420" height="44" rx="9" fill="#d1fae5" stroke="#34d399"/>
      <circle cx="84" cy="274" r="11" fill="#10b981"/><text x="84" y="278" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">4</text>
      <text x="106" y="279" font-weight="700" fill="#065f46">hybrid signals <tspan font-weight="400" fill="#047857">· imports · naming · siblings</tspan></text>
    </g>
    <g>
      <rect x="60" y="308" width="420" height="44" rx="9" fill="#d1fae5" stroke="#34d399"/>
      <circle cx="84" cy="330" r="11" fill="#10b981"/><text x="84" y="334" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">5</text>
      <text x="106" y="335" font-weight="700" fill="#065f46">filter <tspan font-weight="400" fill="#047857">· drop already_have</tspan></text>
    </g>
    <g>
      <rect x="60" y="364" width="420" height="44" rx="9" fill="#d1fae5" stroke="#34d399"/>
      <circle cx="84" cy="386" r="11" fill="#10b981"/><text x="84" y="390" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">6</text>
      <text x="106" y="391" font-weight="700" fill="#065f46">rank <tspan font-weight="400" fill="#047857">· hub-floor · community · learned</tspan></text>
    </g>
    <g>
      <rect x="60" y="420" width="420" height="44" rx="9" fill="#d1fae5" stroke="#34d399"/>
      <circle cx="84" cy="442" r="11" fill="#10b981"/><text x="84" y="446" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">7</text>
      <text x="106" y="447" font-weight="700" fill="#065f46">MMR <tspan font-weight="400" fill="#047857">· diversify near-duplicates</tspan></text>
    </g>
    <g>
      <rect x="60" y="476" width="420" height="44" rx="9" fill="#a7f3d0" stroke="#10b981" stroke-width="1.5"/>
      <circle cx="84" cy="498" r="11" fill="#10b981"/><text x="84" y="502" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">8</text>
      <text x="106" y="503" font-weight="700" fill="#065f46">pack <tspan font-weight="400" fill="#047857">· tier 1 / 2 / 3 under budget</tspan></text>
    </g>
    <g>
      <rect x="60" y="532" width="420" height="44" rx="9" fill="#d1fae5" stroke="#34d399"/>
      <circle cx="84" cy="554" r="11" fill="#10b981"/><text x="84" y="558" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">9</text>
      <text x="106" y="559" font-weight="700" fill="#065f46">post <tspan font-weight="400" fill="#047857">· audit · session · feedback log</tspan></text>
    </g>
  </g>

  <!-- flow arrows -->
  <g stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#cp)">
    <path d="M270 128 V 138"/><path d="M270 184 V 194"/><path d="M270 240 V 250"/>
    <path d="M270 296 V 306"/><path d="M270 352 V 362"/><path d="M270 408 V 418"/>
    <path d="M270 464 V 474"/><path d="M270 520 V 530"/>
  </g>
  <!-- side feeds -->
  <g stroke="#a855f7" stroke-width="1.4" fill="none" stroke-dasharray="6 5" marker-end="url(#cpd)">
    <path d="M594 330 H 482"/>
    <path d="M594 386 H 482"/>
  </g>
</svg>
