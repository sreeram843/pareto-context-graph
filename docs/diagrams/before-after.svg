<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="900" height="450" rx="14" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="32" y="38" font-size="20" font-weight="700" fill="#1f2328">Why it helps</text>
  <text x="32" y="59" font-size="13" fill="#57606a">Same prompt, two ways to gather context.</text>

  <defs>
    <marker id="ba" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Without panel -->
  <rect x="30" y="80" width="400" height="346" rx="12" fill="#fff" stroke="#fca5a5"/>
  <text x="52" y="110" font-size="14" font-weight="700" fill="#b91c1c">Without — grep &amp; guess</text>

  <g>
    <rect x="52" y="126" width="356" height="56" rx="9" fill="#fee2e2" stroke="#f87171"/>
    <text x="72" y="149" font-size="12.5" font-weight="700" fill="#7f1d1d">Keyword grep / guess</text>
    <text x="72" y="168" font-size="11" fill="#991b1b">hope the search terms match</text>

    <rect x="52" y="206" width="356" height="56" rx="9" fill="#fee2e2" stroke="#f87171"/>
    <text x="72" y="229" font-size="12.5" font-weight="700" fill="#7f1d1d">Open ~25 whole files</text>
    <text x="72" y="248" font-size="11" fill="#991b1b">read everything to find what matters</text>

    <rect x="52" y="286" width="356" height="56" rx="9" fill="#fee2e2" stroke="#f87171"/>
    <text x="72" y="309" font-size="12.5" font-weight="700" fill="#7f1d1d">~27K tokens · may miss the key file</text>
    <text x="72" y="328" font-size="11" fill="#991b1b">expensive and still unreliable</text>
  </g>
  <g stroke="#f87171" stroke-width="1.4" fill="none" marker-end="url(#ba)">
    <path d="M230 182 V 204"/>
    <path d="M230 262 V 284"/>
  </g>
  <rect x="52" y="362" width="356" height="44" rx="9" fill="#fef2f2" stroke="#fca5a5" stroke-dasharray="5 4"/>
  <text x="230" y="389" font-size="12" font-weight="700" fill="#b91c1c" text-anchor="middle">Keyword luck · high token cost</text>

  <!-- With panel -->
  <rect x="470" y="80" width="400" height="346" rx="12" fill="#fff" stroke="#6ee7b7"/>
  <text x="492" y="110" font-size="14" font-weight="700" fill="#047857">With — pareto-context-graph</text>

  <g>
    <rect x="492" y="126" width="356" height="50" rx="9" fill="#d1fae5" stroke="#34d399"/>
    <text x="512" y="147" font-size="12.5" font-weight="700" fill="#065f46">context (tier 1) → ~15 ranked paths</text>
    <text x="512" y="165" font-size="11" fill="#047857">~450-token map before opening anything</text>

    <rect x="492" y="190" width="356" height="50" rx="9" fill="#d1fae5" stroke="#34d399"/>
    <text x="512" y="211" font-size="12.5" font-weight="700" fill="#065f46">Escalate ~4 files to tier 2 / 3</text>
    <text x="512" y="229" font-size="11" fill="#047857">signatures or chunks, only where needed</text>

    <rect x="492" y="254" width="356" height="50" rx="9" fill="#d1fae5" stroke="#34d399"/>
    <text x="512" y="275" font-size="12.5" font-weight="700" fill="#065f46">Right files · a fraction of the tokens</text>
    <text x="512" y="293" font-size="11" fill="#047857">git co-change + query, not keyword luck</text>

    <rect x="492" y="318" width="356" height="50" rx="9" fill="#d1fae5" stroke="#34d399"/>
    <text x="512" y="339" font-size="12.5" font-weight="700" fill="#065f46">Follow-up → delta only</text>
    <text x="512" y="357" font-size="11" fill="#047857">already_have / session skip repeats</text>
  </g>
  <g stroke="#34d399" stroke-width="1.4" fill="none" marker-end="url(#ba)">
    <path d="M670 176 V 188"/>
    <path d="M670 240 V 252"/>
    <path d="M670 304 V 316"/>
  </g>
  <rect x="492" y="384" width="356" height="34" rx="9" fill="#ecfdf5" stroke="#6ee7b7" stroke-dasharray="5 4"/>
  <text x="670" y="406" font-size="12" font-weight="700" fill="#047857" text-anchor="middle">Right files first, then fewer tokens</text>
</svg>
