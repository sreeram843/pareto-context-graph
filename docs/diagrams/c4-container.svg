<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="900" height="470" rx="14" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="32" y="38" font-size="20" font-weight="700" fill="#1f2328">Containers — pareto-context-graph</text>
  <text x="32" y="59" font-size="13" fill="#57606a">Every surface calls one shared pipeline: select → rank → pack, over a SQLite co-change graph.</text>

  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Surfaces -->
  <g font-size="11">
    <rect x="30" y="104" width="178" height="58" rx="10" fill="#bfdbfe" stroke="#3b82f6"/>
    <rect x="30" y="104" width="6" height="58" rx="3" fill="#3b82f6"/>
    <text x="50" y="128" font-size="13" font-weight="700" fill="#1e3a8a">MCP server</text>
    <text x="50" y="147" fill="#1e40af">serve · stdio JSON-RPC</text>

    <rect x="30" y="196" width="178" height="58" rx="10" fill="#bfdbfe" stroke="#3b82f6"/>
    <rect x="30" y="196" width="6" height="58" rx="3" fill="#3b82f6"/>
    <text x="50" y="220" font-size="13" font-weight="700" fill="#1e3a8a">CLI / CI</text>
    <text x="50" y="239" fill="#1e40af">build · sync · query · eval</text>

    <rect x="30" y="288" width="178" height="58" rx="10" fill="#bfdbfe" stroke="#3b82f6"/>
    <rect x="30" y="288" width="6" height="58" rx="3" fill="#3b82f6"/>
    <text x="50" y="312" font-size="13" font-weight="700" fill="#1e3a8a">Python API</text>
    <text x="50" y="331" fill="#1e40af">ParetoContextGraph</text>
  </g>

  <!-- Engine boundary -->
  <rect x="252" y="86" width="358" height="338" rx="12" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="431" y="108" font-size="13" font-weight="700" fill="#047857" text-anchor="middle">context engine [Python]</text>

  <!-- Stages -->
  <g>
    <rect x="278" y="124" width="306" height="80" rx="10" fill="#a7f3d0" stroke="#10b981"/>
    <rect x="278" y="124" width="6" height="80" rx="3" fill="#10b981"/>
    <text x="296" y="148" font-size="13" font-weight="700" fill="#065f46">1 · Select</text>
    <text x="296" y="168" font-size="11" fill="#047857">co-change BFS / RWR + query fusion</text>
    <text x="296" y="184" font-size="11" fill="#047857">(path · symbol · BM25 · embed) + imports</text>

    <rect x="278" y="218" width="306" height="80" rx="10" fill="#a7f3d0" stroke="#10b981"/>
    <rect x="278" y="218" width="6" height="80" rx="3" fill="#10b981"/>
    <text x="296" y="242" font-size="13" font-weight="700" fill="#065f46">2 · Rank</text>
    <text x="296" y="262" font-size="11" fill="#047857">locality · hub-floor · community ·</text>
    <text x="296" y="278" font-size="11" fill="#047857">learned feedback · MMR diversity</text>

    <rect x="278" y="312" width="306" height="80" rx="10" fill="#a7f3d0" stroke="#10b981"/>
    <rect x="278" y="312" width="6" height="80" rx="3" fill="#10b981"/>
    <text x="296" y="336" font-size="13" font-weight="700" fill="#065f46">3 · Pack</text>
    <text x="296" y="356" font-size="11" fill="#047857">tier-1 map → tier-2 signatures → tier-3</text>
    <text x="296" y="372" font-size="11" fill="#047857">chunks, within the token budget</text>
  </g>
  <!-- stage flow arrows -->
  <g stroke="#10b981" stroke-width="1.4" fill="none" marker-end="url(#a2)">
    <path d="M431 204 V 216"/>
    <path d="M431 298 V 310"/>
  </g>

  <!-- graph.db -->
  <ellipse cx="724" cy="150" rx="56" ry="13" fill="#e9d5ff" stroke="#a855f7"/>
  <path d="M668 150 v74 a56 13 0 0 0 112 0 v-74" fill="#e9d5ff" stroke="#a855f7"/>
  <text x="724" y="178" font-size="13" font-weight="700" fill="#6b21a8" text-anchor="middle">graph.db</text>
  <text x="724" y="196" font-size="10" fill="#7e22ce" text-anchor="middle">SQLite + WAL</text>
  <text x="724" y="212" font-size="10" fill="#7e22ce" text-anchor="middle">edges · index · feedback</text>

  <!-- Git CLI -->
  <rect x="668" y="300" width="112" height="80" rx="10" fill="#e5e7eb" stroke="#9ca3af"/>
  <text x="724" y="332" font-size="12.5" font-weight="700" fill="#374151" text-anchor="middle">Git CLI</text>
  <text x="724" y="350" font-size="10" fill="#4b5563" text-anchor="middle">history</text>
  <text x="724" y="364" font-size="10" fill="#4b5563" text-anchor="middle">+ file list</text>

  <!-- surfaces -> engine -->
  <g stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#a2)">
    <path d="M208 133 C 232 140, 240 150, 276 158"/>
    <path d="M208 225 C 236 232, 244 240, 276 248"/>
    <path d="M208 317 C 232 332, 244 346, 276 352"/>
  </g>
  <!-- engine <-> db, engine -> git -->
  <g stroke="#6b7280" stroke-width="1.3" fill="none">
    <path d="M584 168 C 620 176, 632 182, 666 188" marker-end="url(#a2)" marker-start="url(#a2)"/>
    <path d="M584 350 C 620 346, 634 342, 666 338" marker-end="url(#a2)"/>
  </g>

  <g font-size="10.5" fill="#475569">
    <text x="612" y="178">read · write</text>
    <text x="612" y="332">subprocess</text>
  </g>
</svg>
