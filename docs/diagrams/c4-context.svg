<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="900" height="470" rx="14" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="32" y="40" font-size="20" font-weight="700" fill="#1f2328">System context — pareto-context-graph</text>
  <text x="32" y="62" font-size="13" fill="#57606a">One engine, three ways to call it: ranked, token-budgeted file context from git history.</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Developer -->
  <rect x="34" y="190" width="150" height="86" rx="10" fill="#fde68a" stroke="#d9a400"/>
  <rect x="34" y="190" width="6" height="86" rx="3" fill="#d9a400"/>
  <circle cx="109" cy="216" r="11" fill="#fff" stroke="#9a7400"/>
  <text x="109" y="248" font-size="14" font-weight="700" fill="#5c4a00" text-anchor="middle">Developer</text>
  <text x="109" y="265" font-size="11" fill="#7a6500" text-anchor="middle">[person]</text>

  <!-- Surfaces -->
  <g font-size="11">
    <rect x="248" y="116" width="208" height="62" rx="10" fill="#bfdbfe" stroke="#3b82f6"/>
    <rect x="248" y="116" width="6" height="62" rx="3" fill="#3b82f6"/>
    <text x="270" y="141" font-size="13" font-weight="700" fill="#1e3a8a">AI IDE agent</text>
    <text x="270" y="160" fill="#1e40af">Cursor · Copilot · Claude · VS Code</text>

    <rect x="248" y="207" width="208" height="62" rx="10" fill="#bfdbfe" stroke="#3b82f6"/>
    <rect x="248" y="207" width="6" height="62" rx="3" fill="#3b82f6"/>
    <text x="270" y="232" font-size="13" font-weight="700" fill="#1e3a8a">CLI / CI</text>
    <text x="270" y="251" fill="#1e40af">pareto-context-graph &lt;cmd&gt;</text>

    <rect x="248" y="298" width="208" height="62" rx="10" fill="#bfdbfe" stroke="#3b82f6"/>
    <rect x="248" y="298" width="6" height="62" rx="3" fill="#3b82f6"/>
    <text x="270" y="323" font-size="13" font-weight="700" fill="#1e3a8a">Python library</text>
    <text x="270" y="342" fill="#1e40af">ParetoContextGraph(...)</text>
  </g>

  <!-- System -->
  <rect x="520" y="178" width="214" height="114" rx="12" fill="#a7f3d0" stroke="#10b981" stroke-width="1.5"/>
  <rect x="520" y="178" width="6" height="114" rx="3" fill="#10b981"/>
  <text x="627" y="214" font-size="15" font-weight="700" fill="#065f46" text-anchor="middle">pareto-context-graph</text>
  <text x="627" y="234" font-size="11" fill="#047857" text-anchor="middle">[software system]</text>
  <text x="627" y="260" font-size="11.5" fill="#047857" text-anchor="middle">Ranks the files that matter</text>
  <text x="627" y="277" font-size="11.5" fill="#047857" text-anchor="middle">for a prompt, under a token budget</text>

  <!-- Git repo (external) -->
  <rect x="784" y="108" width="100" height="80" rx="10" fill="#e5e7eb" stroke="#9ca3af"/>
  <text x="834" y="140" font-size="12.5" font-weight="700" fill="#374151" text-anchor="middle">Git repo</text>
  <text x="834" y="158" font-size="10" fill="#4b5563" text-anchor="middle">history</text>
  <text x="834" y="172" font-size="10" fill="#4b5563" text-anchor="middle">+ file tree</text>

  <!-- graph.db (datastore) -->
  <ellipse cx="834" cy="270" rx="50" ry="12" fill="#e9d5ff" stroke="#a855f7"/>
  <path d="M784 270 v34 a50 12 0 0 0 100 0 v-34" fill="#e9d5ff" stroke="#a855f7"/>
  <text x="834" y="292" font-size="12.5" font-weight="700" fill="#6b21a8" text-anchor="middle">graph.db</text>
  <text x="834" y="308" font-size="10" fill="#7e22ce" text-anchor="middle">co-change graph</text>

  <!-- Developer -> surfaces -->
  <g stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#arr)">
    <path d="M184 214 C 214 196, 222 168, 246 150"/>
    <path d="M184 233 H 246"/>
    <path d="M184 252 C 214 270, 222 300, 246 326"/>
  </g>
  <!-- surfaces -> system -->
  <g stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#arr)">
    <path d="M456 147 C 492 152, 496 200, 518 216"/>
    <path d="M456 238 H 518"/>
    <path d="M456 329 C 492 326, 496 272, 518 254"/>
  </g>
  <!-- system -> git / db -->
  <g stroke="#6b7280" stroke-width="1.3" fill="none" marker-end="url(#arr)">
    <path d="M734 202 C 762 186, 766 164, 784 150"/>
    <path d="M734 268 C 762 260, 766 258, 782 258"/>
  </g>

  <g font-size="10.5" fill="#475569">
    <text x="150" y="206">uses</text>
    <text x="470" y="172">MCP · stdio</text>
    <text x="470" y="228">subcommands</text>
    <text x="470" y="356">import</text>
    <text x="742" y="170">git log · ls-files</text>
    <text x="742" y="300">build · read</text>
  </g>
</svg>
