name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev,tiktoken,policy,otel]"

      - name: Ruff
        run: |
          ruff check src/pareto_context_graph
          ruff format --check src/pareto_context_graph tests

      - name: Mypy
        run: mypy src/pareto_context_graph

      - name: Configure git for synthetic test repos
        run: |
          git config --global core.fsmonitor false
          git config --global core.preloadindex false
          git config --global core.fsync all

      - name: Tests with coverage
        run: pytest --cov=pareto_context_graph --cov-report=term-missing
